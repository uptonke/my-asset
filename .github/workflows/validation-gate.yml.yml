name: Validation Gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run Validation Gate v4.6
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_repo_integrity.py || {
            echo "Validation Gate failed. Dumping summary:"
            if [ -f data/repo_architecture/validation_gate_summary.md ]; then
              cat data/repo_architecture/validation_gate_summary.md
            fi
            if [ -f data/repo_architecture/validation_gate_latest.json ]; then
              echo "VALIDATION_GATE_LATEST_JSON_BEGIN"
              cat data/repo_architecture/validation_gate_latest.json
              echo "VALIDATION_GATE_LATEST_JSON_END"
            fi
            exit 1
          }

      - name: Upload validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-gate-v4.6
          if-no-files-found: error
          path: |
            data/repo_architecture/validation_gate_latest.json
            data/repo_architecture/validation_gate_summary.md
            schemas/**/*.json
            docs/SCHEMA_REGISTRY.md

      - name: Commit validation output
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/repo_architecture/validation_gate_latest.json data/repo_architecture/validation_gate_summary.md schemas/ docs/SCHEMA_REGISTRY.md scripts/validate_repo_integrity.py package.json || true
          if [ -f .github/workflows/validation-gate.yml.yml ]; then
            git add -A .github/workflows/validation-gate.yml.yml || true
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Run validation gate v4.6"
            git push
          fi
