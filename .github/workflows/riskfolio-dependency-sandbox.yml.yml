name: Riskfolio-Lib Dependency Sandbox

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  riskfolio-dependency-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Riskfolio-Lib sandbox dependencies
        run: |
          pip install -r requirements-riskfolio.txt

      - name: Run Riskfolio-Lib dependency probe
        run: |
          python scripts/check_riskfolio_deps.py

      - name: Upload dependency probe artifact
        uses: actions/upload-artifact@v4
        with:
          name: riskfolio-dependency-status
          path: data/optimizer/riskfolio_dependency_status.json

      - name: Commit dependency probe output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/optimizer/riskfolio_dependency_status.json
          git diff --cached --quiet || git commit -m "Update Riskfolio dependency status"
          git push
