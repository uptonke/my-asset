name: Apply Frontend Tailwind Migration

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Node dependencies
        run: npm install

      - name: Patch index.html
        run: python scripts/apply_frontend_migration.py

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Validate frontend JS
        run: node --check assets/js/quant-main-display.js

      - name: Commit generated frontend assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html \
            package.json \
            package-lock.json \
            tailwind.config.js \
            postcss.config.js \
            assets/css/tailwind-input.css \
            assets/css/tailwind-built.css \
            assets/css/60-design-token-denoise.css \
            assets/js/quant-main-display.js \
            scripts/apply_frontend_migration.py

          if git diff --cached --quiet; then
            echo "No frontend migration changes to commit."
          else
            git commit -m "Apply frontend Tailwind migration"
            git push
          fi
