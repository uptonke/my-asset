name: Daily Quant Pipeline

on:
  schedule:
    - cron: '0 21 * * 0'
  workflow_dispatch: 

jobs:
  run-quant-engine:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 下載程式碼
        uses: actions/checkout@v4  # 🌟 升級到 v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5  # 🌟 升級到 v5
        with:
          python-version: '3.12'

      - name: 📦 安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 執行量化分析腳本
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python main.py
