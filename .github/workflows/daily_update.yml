name: Daily Quant Pipeline

on:
  workflow_dispatch: # 保留手動按鈕，方便隨時測試
  schedule:
    # 💡 設定在國際標準時 (UTC) 每週五晚上 16:00 執行
    # 換算過來就是台灣時間 (UTC+8) 每週六早上 00:00
    - cron: '0 5 */2 * *'

jobs:
  run-quant-engine:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 下載程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # ⚡️ 關鍵升級：啟動 Pip 依賴快取

      - name: 📦 安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install google-genai # 🌟 整合在這裡，確保腳本執行前已安裝好 Gemini 大腦
          pip install ccxt # 🌟 確保安裝幣安 API 套件

      - name: 🚀 執行量化分析腳本
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 🌟 傳遞 Gemini 金鑰給 Python
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }} # 🌟 傳遞幣安 API 金鑰給 Python
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }} # 🌟 傳遞幣安 Secret 金鑰給 Python
        run: python main.py
