name: Optimizer Robustness Sandbox

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimizer-robustness:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      SUPABASE_TABLE: portfolio_db
      PORTFOLIO_ROW_ID: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install skfolio dependencies
        run: |
          pip install -r requirements-optimizer.txt

      - name: Install Riskfolio-Lib dependencies
        run: |
          pip install -r requirements-riskfolio.txt

      - name: Probe skfolio dependencies
        run: |
          python scripts/check_optimizer_deps.py

      - name: Probe Riskfolio-Lib dependencies
        run: |
          python scripts/check_riskfolio_deps.py

      - name: Run optimizer robustness sandbox
        run: |
          python scripts/run_optimizer_robustness.py

      - name: Upload robustness artifact
        uses: actions/upload-artifact@v4
        with:
          name: optimizer-robustness-output
          path: |
            data/optimizer/optimizer_robustness_latest.json
            data/optimizer/optimizer_robustness_summary.md

      - name: Commit robustness output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/optimizer/optimizer_robustness_latest.json data/optimizer/optimizer_robustness_summary.md
          git diff --cached --quiet || git commit -m "Update optimizer robustness output"
          git push
