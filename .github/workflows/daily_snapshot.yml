name: Daily NAV Snapshot

on:
  schedule:
    - cron: '0 12 * * 6'
  workflow_dispatch: # 允許你隨時在 GitHub 後台手動點擊按鈕觸發

jobs:
  take-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下載程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # 🌟 加入快取機制，之後每次跑不用重新下載所有套件，速度翻倍

      - name: 📦 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt # 🌟 關鍵修正：讓 Runner 乖乖照清單安裝，yfinance 才會成功載入

      - name: 📸 執行自動快照
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python auto_snapshot.py
