name: Daily NAV Snapshot

on:
  schedule:
    - cron: '0 12 * * 6'
  workflow_dispatch:

jobs:
  take-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下載程式碼
        uses: actions/checkout@v4  # 🌟 升級到 v4

      - name: 🐍 設定 Python
        uses: actions/setup-python@v5 # 🌟 升級到 v5
        with:
          python-version: '3.12'

      - name: 📦 安裝套件
        run: pip install supabase pytz requests pandas

      - name: 📸 執行自動快照
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python auto_snapshot.py
