name: Off-site Data Backup

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    # 🌟 架構師補強：給予機器人寫入程式碼的權限，否則最後一步 git push 會失敗！
    permissions:
      contents: write 
      
    steps:
      - name: 📥 下載程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 安裝套件
        run: pip install supabase

      - name: 🚀 執行備份
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python backup.py

      - name: 💾 將備份檔存入 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          # 檢查是否有檔案變動，如果有才 commit，避免沒有新備份時報錯中斷
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-backup: $(date +'%Y-%m-%d')" && git push)
