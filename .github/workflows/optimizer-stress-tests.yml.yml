name: Optimizer Stress Tests

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimizer-stress-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Preflight patch stress script import
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("scripts/run_optimizer_stress_tests.py")
          s = p.read_text(encoding="utf-8")
          head = "\n".join(s.splitlines()[:20])
          if "import os" not in head:
              s = s.replace("import json\nimport math\n", "import json\nimport math\nimport os\n", 1)
              p.write_text(s, encoding="utf-8")
          print("\n".join(p.read_text(encoding="utf-8").splitlines()[:10]))
          PY
          python -m py_compile scripts/run_optimizer_stress_tests.py

      - name: Run optimizer stress tests
        run: |
          python scripts/run_optimizer_stress_tests.py

      - name: Upload stress artifact
        uses: actions/upload-artifact@v4
        with:
          name: optimizer-stress-output
          path: |
            data/optimizer/optimizer_stress_latest.json
            data/optimizer/optimizer_stress_summary.md

      - name: Commit stress output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/optimizer/optimizer_stress_latest.json data/optimizer/optimizer_stress_summary.md
          git diff --cached --quiet || git commit -m "Update optimizer stress test output"
          git push
