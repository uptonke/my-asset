name: Optimizer Lab

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Select the sandbox / maintenance task to run"
        required: true
        default: "optimizer_stress_tests"
        type: choice
        options:
          - optimizer_install_probe
          - skfolio_sandbox
          - riskfolio_dependency_probe
          - riskfolio_sandbox
          - optimizer_robustness
          - optimizer_stress_tests
          - apply_terminal_ia_phase2
          - technical_debt_cleanup
          - all_optimizer_outputs

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
  TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
  SUPABASE_TABLE: portfolio_db
  PORTFOLIO_ROW_ID: "1"

jobs:
  optimizer-lab:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node for frontend and validation checks
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install task dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pandas numpy

          case "${{ github.event.inputs.task }}" in
            optimizer_install_probe)
              pip install -r requirements.txt
              pip install -r requirements-optimizer.txt
              ;;
            skfolio_sandbox)
              pip install -r requirements.txt
              pip install -r requirements-optimizer.txt
              ;;
            riskfolio_dependency_probe)
              pip install -r requirements.txt
              pip install -r requirements-riskfolio.txt
              ;;
            riskfolio_sandbox)
              pip install -r requirements.txt
              pip install -r requirements-riskfolio.txt
              ;;
            optimizer_robustness)
              pip install -r requirements.txt
              pip install -r requirements-optimizer.txt
              pip install -r requirements-riskfolio.txt
              ;;
            optimizer_stress_tests)
              pip install pandas numpy
              ;;
            all_optimizer_outputs)
              pip install -r requirements.txt
              pip install -r requirements-optimizer.txt
              pip install -r requirements-riskfolio.txt
              ;;
            apply_terminal_ia_phase2)
              npm install
              ;;
            technical_debt_cleanup)
              echo "No third-party dependencies required."
              ;;
            *)
              echo "Unknown task: ${{ github.event.inputs.task }}"
              exit 1
              ;;
          esac

      - name: Run selected Optimizer Lab task
        shell: bash
        run: |
          set -euo pipefail

          patch_stress_import() {
            python - <<'PY'
          from pathlib import Path
          p = Path("scripts/run_optimizer_stress_tests.py")
          if p.exists():
              s = p.read_text(encoding="utf-8")
              head = "\n".join(s.splitlines()[:20])
              if "import os" not in head:
                  s = s.replace("import json\nimport math\n", "import json\nimport math\nimport os\n", 1)
                  p.write_text(s, encoding="utf-8")
              print("\n".join(p.read_text(encoding="utf-8").splitlines()[:10]))
          PY
            python -m py_compile scripts/run_optimizer_stress_tests.py
          }

          case "${{ github.event.inputs.task }}" in
            optimizer_install_probe)
              python scripts/check_optimizer_deps.py
              ;;
            skfolio_sandbox)
              python scripts/check_optimizer_deps.py
              python scripts/run_skfolio_sandbox.py
              ;;
            riskfolio_dependency_probe)
              python scripts/check_riskfolio_deps.py
              ;;
            riskfolio_sandbox)
              python scripts/check_riskfolio_deps.py
              python scripts/run_riskfolio_sandbox.py
              ;;
            optimizer_robustness)
              python scripts/check_optimizer_deps.py
              python scripts/check_riskfolio_deps.py
              python scripts/run_optimizer_robustness.py
              ;;
            optimizer_stress_tests)
              patch_stress_import
              python scripts/run_optimizer_stress_tests.py
              ;;
            apply_terminal_ia_phase2)
              python scripts/apply_terminal_ia_phase2.py
              npm run build:css
              node --check assets/js/terminal-ia-phase2.js
              if [ -f assets/js/terminal-ui-polish.js ]; then node --check assets/js/terminal-ui-polish.js; fi
              if [ -f assets/js/quant-main-display.js ]; then node --check assets/js/quant-main-display.js; fi
              ;;
            technical_debt_cleanup)
              python scripts/v191_workflow_consolidation_cleanup.py
              ;;
            all_optimizer_outputs)
              python scripts/check_optimizer_deps.py
              python scripts/check_riskfolio_deps.py
              python scripts/run_skfolio_sandbox.py
              python scripts/run_riskfolio_sandbox.py
              python scripts/run_optimizer_robustness.py
              patch_stress_import
              python scripts/run_optimizer_stress_tests.py
              ;;
            *)
              echo "Unknown task: ${{ github.event.inputs.task }}"
              exit 1
              ;;
          esac

      - name: Build Portfolio Optimizer Decision Center v2.0
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_optimizer_decision_center.py

      - name: Build Rebalance Candidate Generator v2.1
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_rebalance_candidate_generator.py

      - name: Build Risk Reduction Simulator v2.2
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_risk_reduction_simulator.py

      - name: Build Constraint-Aware Rebalance Sandbox v2.3
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_constraint_aware_rebalance_sandbox.py

      - name: Build Human Approval Layer v2.4
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_human_approval_layer.py

      - name: Build Action Audit Trail v2.5
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_action_audit_trail.py

      - name: Build Regime-Aware Optimizer v3.0
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_regime_aware_optimizer.py

      - name: Build Bayesian Black-Litterman Sandbox v3.1
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_black_litterman_sandbox.py

      - name: Build Expected Return Model v3.2
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_expected_return_model.py

      - name: Build Walk-forward Backtest v3.3
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_walk_forward_backtest.py

      - name: Build Model Governance Dashboard v3.4
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_model_governance_dashboard.py


      - name: Build Forecast Feature Store v5.0
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_forecast_feature_store.py

      - name: Build Alpha Research Sandbox v5.1
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_alpha_research_sandbox.py

      - name: Build Rebalance Candidate Ranking v5.2
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_rebalance_candidate_ranking.py

      - name: Build Alpha Validation Gate v6.0
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_alpha_validation_gate.py

      - name: Build Manual Rebalance Proposal v7.0
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_manual_rebalance_proposal.py

      - name: Build Execution-Ready Draft v8.0
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_execution_ready_draft.py

      - name: Build Formal Draft Pass Conditions v8.1
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_formal_draft_pass_conditions.py

      - name: Build Manual Approval Input Layer v8.1
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_manual_approval_input_layer.py

      - name: Build Trading Constraints Snapshot v8.1
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_trading_constraints_snapshot.py

      - name: Build Formal Rebalance Draft Gate v8.1
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_formal_rebalance_draft_gate.py

      - name: Build Manual Trade Ticket Generator v9.0
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_manual_trade_ticket_generator.py

      - name: Build Paper Trade Tracker v9.2
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_paper_trade_tracker.py

      - name: Build Gate Failure & Trade Sizing Diagnostics v9.3
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_trade_sizing_diagnostics.py

      - name: Build Manual Approval Console v9.4
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_manual_approval_console.py

      - name: Build Paper Trade Performance Evaluator v9.5
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_paper_trade_performance_evaluator.py

      - name: Build Trade Ticket Explainability v9.6
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_trade_ticket_explainability.py

      - name: Build Human-Confirmed Trade Ticket v10.0
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_human_confirmed_trade_ticket.py

      - name: Validation Gate v4.6
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_repo_integrity.py || {
            echo "Validation Gate failed. Dumping summary:"
            if [ -f data/repo_architecture/validation_gate_summary.md ]; then
              cat data/repo_architecture/validation_gate_summary.md
            fi
            if [ -f data/repo_architecture/validation_gate_latest.json ]; then
              echo "VALIDATION_GATE_LATEST_JSON_BEGIN"
              cat data/repo_architecture/validation_gate_latest.json
              echo "VALIDATION_GATE_LATEST_JSON_END"
            fi
            exit 1
          }

      - name: Upload Optimizer Lab artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optimizer-lab-${{ github.event.inputs.task }}
          if-no-files-found: ignore
          path: |
            data/optimizer/*.json
            data/optimizer/*.md
            data/alpha/*.json
            data/alpha/*.md
            data/repo_architecture/*.json
            data/repo_architecture/*.md
            data/repo_health/*.json
            schemas/**/*.json
            docs/TECHNICAL_DEBT_MAP.md
            docs/SCHEMA_REGISTRY.md
            docs/ALPHA_RESEARCH_SANDBOX.md
            docs/REBALANCE_CANDIDATE_RANKING.md
            docs/EXECUTION_READY_DRAFT_BOUNDARY.md
            docs/FORMAL_REBALANCE_DRAFT_GATE.md
            docs/MANUAL_TRADE_TICKET_GENERATOR.md
            docs/PAPER_TRADE_TRACKER.md
            docs/TRADING_CONSTRAINTS_SNAPSHOT.md
            docs/MANUAL_APPROVAL_INPUT_LAYER.md
            docs/FORMAL_DRAFT_PASS_CONDITIONS.md
            docs/TRADE_SIZING_DIAGNOSTICS.md
            docs/TRADE_TICKET_EXPLAINABILITY.md
            docs/PAPER_TRADE_PERFORMANCE_EVALUATOR.md
            docs/MANUAL_APPROVAL_CONSOLE.md
            docs/HUMAN_CONFIRMED_TRADE_TICKET.md

      - name: Commit task output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/optimizer/ data/alpha/ data/repo_architecture/ data/repo_health/ docs/ schemas/ config/manual_approval_override.json package.json split-manifest.json || true
          git add .github/workflows/ scripts/README.md scripts/v191_workflow_consolidation_cleanup.py scripts/validate_repo_integrity.py scripts/build_forecast_feature_store.py scripts/build_alpha_research_sandbox.py scripts/build_rebalance_candidate_ranking.py scripts/build_alpha_validation_gate.py scripts/build_manual_rebalance_proposal.py scripts/build_execution_ready_draft.py scripts/build_formal_rebalance_draft_gate.py scripts/build_manual_trade_ticket_generator.py scripts/build_paper_trade_tracker.py scripts/build_trade_sizing_diagnostics.py scripts/build_manual_approval_console.py scripts/build_paper_trade_performance_evaluator.py scripts/build_trade_ticket_explainability.py scripts/build_human_confirmed_trade_ticket.py || true

          if [ "${{ github.event.inputs.task }}" = "apply_terminal_ia_phase2" ]; then
            git add index.html assets/css/80-terminal-ia-phase2.css assets/js/terminal-ia-phase2.js scripts/apply_terminal_ia_phase2.py assets/css/tailwind-built.css || true
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Run Optimizer Lab task: ${{ github.event.inputs.task }}"
            git push
          fi
