name: Weekly Macro Pipeline

on:
  workflow_dispatch:
  schedule:
    # 每週一 00:30 Asia/Taipei = 週日 16:30 UTC
    - cron: '30 16 * * 0'

jobs:
  weekly-macro:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 下載程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧭 更新 Adjusted Market Compass
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_TABLE: portfolio_db
          PORTFOLIO_ROW_ID: '1'
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update_market_compass.py

      - name: 🏛️ 更新 Weekly Official Macro Layer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_TABLE: portfolio_db
          PORTFOLIO_ROW_ID: '1'

          # Optional override：公開資料 URL 預設讀 config/official_data_sources.json；Variables 只用來臨時覆蓋，不要放 Secrets。
          TAIWAN_BUSINESS_SIGNAL_URL: ${{ vars.TAIWAN_BUSINESS_SIGNAL_URL }}
          TAIWAN_EXPORT_ORDERS_URL: ${{ vars.TAIWAN_EXPORT_ORDERS_URL }}
          TAIWAN_CPI_URL: ${{ vars.TAIWAN_CPI_URL }}
          TAIWAN_GDP_URL: ${{ vars.TAIWAN_GDP_URL }}
          TAIWAN_MONEY_SUPPLY_URL: ${{ vars.TAIWAN_MONEY_SUPPLY_URL }}
          TAIWAN_FX_RESERVES_URL: ${{ vars.TAIWAN_FX_RESERVES_URL }}

          # Optional override：BIS/OECD/IMF 慢變數層。JSON object，key=指標名，value=可直接 GET 的 API URL。
          BIS_API_URLS: ${{ vars.BIS_API_URLS }}
          OECD_API_URLS: ${{ vars.OECD_API_URLS }}
          IMF_API_URLS: ${{ vars.IMF_API_URLS }}
          WORLD_BANK_INDICATORS: ${{ vars.WORLD_BANK_INDICATORS }}
        run: python scripts/update_weekly_official_meta.py
