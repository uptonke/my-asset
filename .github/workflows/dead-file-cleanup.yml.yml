name: Dead File Cleanup v4.7

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Apply v4.7 dead file cleanup
        shell: bash
        run: |
          set -euo pipefail
          python scripts/apply_dead_file_cleanup.py --execute

      - name: Rebuild architecture reports after cleanup
        shell: bash
        run: |
          set -euo pipefail
          python scripts/audit_repo_architecture.py
          python scripts/build_dead_file_cleanup_plan.py
          python scripts/build_consolidated_release_manifest.py
          python scripts/build_frontend_bundle.py --check
          node --check assets/js/app.bundle.js
          node --check assets/js/quant-main-display.js
          if [ -f assets/js/terminal-ui-polish.js ]; then node --check assets/js/terminal-ui-polish.js; fi
          if [ -f assets/js/terminal-ia-phase2.js ]; then node --check assets/js/terminal-ia-phase2.js; fi

      - name: Run Validation Gate v4.6 after cleanup
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_repo_integrity.py

      - name: Upload cleanup artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dead-file-cleanup-v4.7
          if-no-files-found: error
          path: |
            data/repo_architecture/dead_file_cleanup_execution_latest.json
            data/repo_architecture/dead_file_cleanup_execution_summary.md
            data/repo_architecture/dead_file_cleanup_plan_latest.json
            data/repo_architecture/dead_file_cleanup_plan_summary.md
            data/repo_architecture/consolidated_release_manifest_latest.json
            data/repo_architecture/consolidated_release_manifest_summary.md
            data/repo_architecture/validation_gate_latest.json
            data/repo_architecture/validation_gate_summary.md

      - name: Commit cleanup output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # v4 hygiene: never commit Python bytecode/cache generated by py_compile/imports.
          find . -type d -name "__pycache__" -prune -exec rm -rf {} +
          find . -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete
          git rm -r --cached --ignore-unmatch scripts/__pycache__ scripts/modules/__pycache__ || true
          git rm --cached --ignore-unmatch scripts/**/*.pyc scripts/modules/**/*.pyc || true

          git add -A \
            README_FRONTEND_MIGRATION.md \
            README_TERMINAL_DESIGN_SYSTEM.md \
            README_V05_V06_OVERLAY.md \
            daily_update.yml \
            weekly_macro_update.yml \
            frontend_tailwind_migration.yml \
            00-bootstrap-and-cro.js \
            00-tailwind-config.js \
            10-state-auth-cloud.js \
            30-risk-xray-tail.js \
            40-actions-history-buffer.js \
            60-ui-and-charts.js \
            app.bundle.js \
            quant-main-display.js \
            scripts/apply_dead_file_cleanup.py \
            data/repo_architecture/ \
            .github/workflows/dead-file-cleanup.yml.yml \
            || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Apply dead file cleanup v4.7"
            git push
          fi
