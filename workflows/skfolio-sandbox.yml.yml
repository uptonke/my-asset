name: skfolio Optimizer Sandbox

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  skfolio-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      SUPABASE_TABLE: portfolio_db
      PORTFOLIO_ROW_ID: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install optimizer dependencies
        run: |
          pip install -r requirements-optimizer.txt

      - name: Probe optimizer dependencies
        run: |
          python scripts/check_optimizer_deps.py

      - name: Run skfolio sandbox
        run: |
          python scripts/run_skfolio_sandbox.py

      - name: Upload sandbox artifact
        uses: actions/upload-artifact@v4
        with:
          name: skfolio-sandbox-output
          path: |
            data/optimizer/skfolio_sandbox_latest.json
            data/optimizer/skfolio_sandbox_summary.md

      - name: Commit sandbox output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/optimizer/skfolio_sandbox_latest.json data/optimizer/skfolio_sandbox_summary.md
          git diff --cached --quiet || git commit -m "Update skfolio sandbox output"
          git push
