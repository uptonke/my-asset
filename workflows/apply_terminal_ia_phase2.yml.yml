name: Apply Terminal IA Phase 2

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply-terminal-ia-phase2:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Node dependencies
        run: npm install

      - name: Apply terminal IA phase 2
        run: python scripts/apply_terminal_ia_phase2.py

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Validate frontend JS
        run: |
          node --check assets/js/terminal-ia-phase2.js
          node --check assets/js/terminal-ui-polish.js
          node --check assets/js/quant-main-display.js

      - name: Commit terminal IA phase 2 assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html \
            assets/css/80-terminal-ia-phase2.css \
            assets/css/90-typography.css \
            assets/js/terminal-ia-phase2.js \
            scripts/apply_terminal_ia_phase2.py \
            assets/css/tailwind-built.css

          if git diff --cached --quiet; then
            echo "No terminal IA phase 2 changes to commit."
          else
            git commit -m "Apply terminal information architecture phase 2"
            git push
          fi

