name: Apply Terminal Design System

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply-terminal-design-system:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Node dependencies
        run: npm install

      - name: Apply terminal design-system patch
        run: python scripts/apply_terminal_design_system.py

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Validate frontend JS
        run: |
          node --check assets/js/quant-main-display.js
          node --check assets/js/terminal-ui-polish.js

      - name: Commit terminal design-system assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html \
            assets/css/70-terminal-design-system.css \
            assets/js/terminal-ui-polish.js \
            scripts/apply_terminal_design_system.py \
            scripts/rollback_terminal_design_system.py \
            assets/css/tailwind-built.css

          if git diff --cached --quiet; then
            echo "No terminal design-system changes to commit."
          else
            git commit -m "Apply terminal design system"
            git push
          fi
