name: Optimizer Install Sandbox

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  optimizer-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install optional optimizer dependencies
        run: |
          pip install -r requirements-optimizer.txt

      - name: Run optimizer dependency probe
        run: |
          python scripts/check_optimizer_deps.py
